<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members | KUET Career Club</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root[data-theme="dark"] {
      --bg: #0d0d0d; --bg2: #111; --card: #161616;
      --text: #fff; --text-muted: rgba(255,255,255,0.55);
      --text-faint: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.08);
      --border-nav: rgba(255,255,255,0.12);
      --nav-bg: rgba(255,255,255,0.07);
      --input-bg: #1e1e1e;
      --copyright: rgba(255,255,255,0.2);
    }
    :root[data-theme="light"] {
      --bg: #f5f5f5; --bg2: #ebebeb; --card: #fff;
      --text: #0a0a0a; --text-muted: rgba(0,0,0,0.6);
      --text-faint: rgba(0,0,0,0.45);
      --border: rgba(0,0,0,0.08);
      --border-nav: rgba(0,0,0,0.12);
      --nav-bg: rgba(0,0,0,0.06);
      --input-bg: #ebebeb;
      --copyright: rgba(0,0,0,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
 
    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 2.5rem; z-index: 10; position: relative; }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); text-decoration: none; }
    .nav-brand img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #1a7a6e; }
    .nav-links-pill { display: flex; align-items: center; background: var(--nav-bg); border: 0.5px solid var(--border-nav); border-radius: 30px; padding: 6px 8px; gap: 4px; }
    .nav-links-pill a { color: var(--text-faint); text-decoration: none; font-size: 13px; padding: 6px 18px; border-radius: 20px; letter-spacing: 0.05em; transition: color 0.2s; }
    .nav-links-pill a.active { color: #1a7a6e; font-weight: 700; border-bottom: 2px solid #1a7a6e; border-radius: 0; }
    .nav-links-pill a:hover { color: var(--text); }
    .theme-toggle { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border-nav); background: var(--nav-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: all 0.2s; }
    .theme-toggle:hover { border-color: #1a7a6e; transform: scale(1.1); }
 
    /* PAGE HEADER */
    .page-header { padding: 4rem 2.5rem 3rem; position: relative; overflow: hidden; }
    .page-header::before { content: ''; position: absolute; left: -100px; top: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(26,122,110,0.15) 0%, transparent 70%); pointer-events: none; }
    .page-tag { font-size: 12px; color: #1a7a6e; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 12px; }
    .page-header h1 { font-size: 48px; font-weight: 700; line-height: 1.1; color: var(--text); margin-bottom: 1rem; }
    .page-header p { font-size: 16px; color: var(--text-muted); max-width: 540px; line-height: 1.7; }
    .header-divider { width: 60px; height: 2px; background: #1a7a6e; margin: 1.5rem 0; }
 
    /* MAIN CONTENT */
    .members-container { padding: 0 2.5rem 4rem; }
 
    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 2rem; }
    .stat-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.75rem; text-align: center; }
    .stat-card h3 { font-size: 11px; letter-spacing: 0.1em; color: var(--text-faint); margin-bottom: 10px; }
    .stat-value { font-size: 42px; font-weight: 700; color: #1a7a6e; line-height: 1; }
 
    /* SEARCH */
    .search-section { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
    .search-box { display: flex; gap: 10px; margin-bottom: 0; }
    .search-box input {
      flex: 1; background: var(--input-bg);
      border: 0.5px solid var(--border);
      border-radius: 8px; padding: 10px 16px;
      color: var(--text); font-size: 14px;
      font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #1a7a6e; }
    .search-box input::placeholder { color: var(--text-faint); }
    .btn-search { background: #1a7a6e; border: none; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s; }
    .btn-search:hover { background: #15695f; }
    .btn-clear { background: transparent; border: 0.5px solid var(--border-nav); color: var(--text-faint); padding: 10px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-clear:hover { border-color: #1a7a6e; color: #1a7a6e; }
 
    /* PROGRAM STATS */
    .program-stats { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
    .program-stats h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
    .program-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .program-item { background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
    .program-name { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .program-count { font-size: 28px; font-weight: 700; color: #1a7a6e; margin-top: 4px; }
 
    /* MEMBER CARDS */
    .members-list { display: grid; gap: 12px; }
    .member-card {
      background: var(--card); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 1.5rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .member-card:hover { border-color: rgba(26,122,110,0.4); transform: translateY(-2px); }
    .member-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
    .member-avatar { width: 42px; height: 42px; border-radius: 50%; background: rgba(26,122,110,0.2); border: 1px solid rgba(26,122,110,0.4); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #1a7a6e; font-weight: 700; flex-shrink: 0; }
    .member-info-wrap { display: flex; align-items: center; gap: 12px; }
    .member-info h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .member-email { color: #1a7a6e; text-decoration: none; font-size: 13px; }
    .member-email:hover { text-decoration: underline; }
    .member-meta { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
    .member-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }
    .detail-label { font-size: 11px; color: var(--text-faint); letter-spacing: 0.06em; font-weight: 600; margin-bottom: 3px; }
    .detail-value { font-size: 14px; color: var(--text-muted); }
    .message-section { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--border); font-size: 14px; color: var(--text-muted); line-height: 1.6; }
 
    /* STATES */
    .loading { text-align: center; padding: 3rem; color: #1a7a6e; font-size: 14px; letter-spacing: 0.06em; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-faint); }
    .empty-state p { font-size: 15px; margin-bottom: 8px; }
    .error-message { background: rgba(224,92,92,0.1); color: #e05c5c; padding: 12px 16px; border-radius: 8px; margin-top: 12px; border-left: 3px solid #e05c5c; font-size: 13px; display: none; }
 
    /* FOOTER */
    .footer-tagline { padding: 2rem 2.5rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .footer-tagline h2 { font-size: 28px; font-weight: 700; color: var(--text); }
    .footer-tagline h2 em { font-style: italic; color: #1a7a6e; }
    .social-links { display: flex; gap: 16px; }
    .social-links a { color: var(--text-faint); text-decoration: none; font-size: 22px; transition: color 0.2s; }
    .social-links a:hover { color: #1a7a6e; }
    .copyright { text-align: right; padding: 0 2.5rem 1.5rem; font-size: 12px; color: var(--copyright); letter-spacing: 0.04em; }
  </style>
</head>
<body>
 
  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <img src="kcc-logo.png" alt="KCC Logo" />
      KUET CAREER CLUB
    </a>
    <div class="nav-links-pill">
      <a href="home.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="events.html">EVENTS</a>
      <a href="members.html" class="active">MEMBERS</a>
      <a href="contact.html">CONTACT</a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </nav>
 
  <div class="page-header">
    <div class="page-tag">OUR COMMUNITY</div>
    <h1>Members<br>Dashboard</h1>
    <div class="header-divider"></div>
    <p>View and manage KUET Career Club members.</p>
  </div>
 
  <div class="members-container">
 
    <!-- Stats -->
    <div class="stats-grid" id="stats-container">
      <div class="stat-card">
        <h3>LOADING</h3>
        <div class="stat-value">—</div>
      </div>
    </div>
 
    <!-- Search -->
    <div class="search-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name, email, or program..." />
        <button class="btn-search" onclick="searchMembers()">Search</button>
        <button class="btn-clear" onclick="clearSearch()">Clear</button>
      </div>
      <div id="error-message" class="error-message" role="status" aria-live="polite"></div>
    </div>
 
    <!-- Program Stats -->
    <div class="program-stats" id="program-stats-container" style="display: none;">
      <h3>Members by Program</h3>
      <div class="program-grid" id="program-grid"></div>
    </div>
 
    <!-- Members List -->
    <div id="members-container">
      <div class="loading">Loading members...</div>
    </div>
 
  </div>
 
  <div class="footer-tagline">
    <h2>Stay ahead of the <em>curve.</em></h2>
    <div class="social-links">
      <a href="https://www.facebook.com/kuetcareerclub/" target="_blank"><i class="ti ti-brand-facebook"></i></a>
      <a href="https://www.linkedin.com/company/kuetcareerclub/" target="_blank"><i class="ti ti-brand-linkedin"></i></a>
    </div>
  </div>
  <div class="copyright">© 2026 KUET CAREER CLUB. ALL RIGHTS RESERVED.</div>
 
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        btn.textContent = '☀️';
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '🌙';
      }
    }
 
    document.addEventListener('DOMContentLoaded', () => {
      loadMembers();
      loadStats();
      document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchMembers();
      });
    });
 
    async function loadMembers(searchTerm = null) {
      try {
        const container = document.getElementById('members-container');
        container.innerHTML = '<div class="loading">Loading members...</div>';
        const url = searchTerm
          ? `/api/members/search?q=${encodeURIComponent(searchTerm)}`
          : '/api/members';
        const response = await fetch(url);
        const data = await response.json();
        if (!response.ok) { showError('Failed to load members'); return; }
        const members = data.members || data;
        if (members.length === 0) {
          container.innerHTML = `<div class="empty-state"><p><strong>No members found</strong></p><p>Members who join will appear here.</p></div>`;
          return;
        }
        container.innerHTML = `<div class="members-list">${members.map(member => `
          <div class="member-card">
            <div class="member-header">
              <div class="member-info-wrap">
                <div class="member-avatar">${escapeHtml(member.data.name.charAt(0).toUpperCase())}</div>
                <div class="member-info">
                  <h3>${escapeHtml(member.data.name)}</h3>
                  <a href="mailto:${escapeHtml(member.data.email)}" class="member-email">${escapeHtml(member.data.email)}</a>
                  <div class="member-meta">Joined: ${new Date(member.submittedAt).toLocaleDateString()}</div>
                </div>
              </div>
            </div>
            <div class="member-details">
              ${member.data.studyProgram ? `<div><div class="detail-label">STUDY PROGRAM</div><div class="detail-value">${escapeHtml(member.data.studyProgram)}</div></div>` : ''}
              ${member.data.interests ? `<div><div class="detail-label">INTERESTS</div><div class="detail-value">${escapeHtml(member.data.interests)}</div></div>` : ''}
            </div>
            ${member.data.message ? `<div class="message-section"><strong>About:</strong> ${escapeHtml(member.data.message)}</div>` : ''}
          </div>`).join('')}</div>`;
      } catch (error) {
        showError('Error loading members. Please try again.');
      }
    }
 
    async function loadStats() {
      try {
        const response = await fetch('/api/members/stats');
        const data = await response.json();
        document.getElementById('stats-container').innerHTML = `
          <div class="stat-card"><h3>TOTAL MEMBERS</h3><div class="stat-value">${data.totalMembers}</div></div>
          <div class="stat-card"><h3>JOINED THIS MONTH</h3><div class="stat-value">${data.joinedThisMonth}</div></div>`;
        if (data.programDistribution && Object.keys(data.programDistribution).length > 0) {
          document.getElementById('program-stats-container').style.display = 'block';
          document.getElementById('program-grid').innerHTML = Object.entries(data.programDistribution)
            .sort((a, b) => b[1] - a[1])
            .map(([program, count]) => `<div class="program-item"><div class="program-name">${escapeHtml(program)}</div><div class="program-count">${count}</div></div>`)
            .join('');
        }
      } catch (error) { console.error('Error loading stats:', error); }
    }
 
    function searchMembers() {
      const term = document.getElementById('searchInput').value.trim();
      if (term.length < 2) { showError('Please enter at least 2 characters to search'); return; }
      loadMembers(term);
    }
 
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('error-message').style.display = 'none';
      loadMembers();
    }
 
    function showError(msg) {
      const el = document.getElementById('error-message');
      el.textContent = msg; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }
 
    function escapeHtml(text) {
      const map = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
