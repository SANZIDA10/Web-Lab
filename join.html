			<form class="contact-form" data-endpoint="/api/join">
				<label for="join-name">Full Name</label>
				<input type="text" id="join-name" name="name" placeholder="Your full name" required>

				<label for="join-email">Email Address</label>
				<input type="email" id="join-email" name="email" placeholder="you@example.com" required>

				<label for="studyProgram">Study Program</label>
				<input type="text" id="studyProgram" name="studyProgram" placeholder="e.g. CSE, EEE, ME">

				<label for="interests">Interests</label>
				<input type="text" id="interests" name="interests" placeholder="Workshops, mentoring, internships">

				<label for="join-message">Why do you want to join?</label>
				<textarea id="join-message" name="message" rows="6" placeholder="Tell us a bit about your goals..." required></textarea>

				<button type="submit" class="cta-btn">Submit Interest</button>
			</form>
